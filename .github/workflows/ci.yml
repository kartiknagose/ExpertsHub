name: CI

on:
  push:
    branches: [master, main]
  pull_request:
    branches: [master, main]

jobs:
  # ── Server: lint + Prisma generate ──
  server:
    name: Server Lint
    runs-on: ubuntu-latest
    services:
      postgres:
        image: postgres:15-alpine
        env:
          POSTGRES_USER: postgres
          POSTGRES_PASSWORD: postgres
          POSTGRES_DB: shadow_db
        ports:
          - 5432:5432
        options: >-
          --health-cmd="pg_isready -U postgres -d shadow_db"
          --health-interval=10s
          --health-timeout=5s
          --health-retries=5
    defaults:
      run:
        working-directory: server
    env:
      SHADOW_DATABASE_URL: postgresql://postgres:postgres@127.0.0.1:5432/shadow_db?schema=public
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: server/package-lock.json

      - run: npm ci
      - run: npx prisma generate
      - run: npx prisma migrate diff --from-migrations ./prisma/migrations --to-schema-datamodel ./prisma/schema.prisma --shadow-database-url "$SHADOW_DATABASE_URL" --exit-code
      - run: npm run lint

  # ── Client: lint + build ──
  client:
    name: Client Lint & Build
    runs-on: ubuntu-latest
    defaults:
      run:
        working-directory: client
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-node@v4
        with:
          node-version: 22
          cache: npm
          cache-dependency-path: client/package-lock.json

      - run: npm ci
      - run: npm install --no-save @rollup/rollup-linux-x64-gnu@4.59.0
      - run: npm run lint
      - run: npm run build
        env:
          VITE_API_URL: "/api"

  # Docker image checks are intentionally excluded from CI.
  # Production deploy path is platform-native (Vercel + Render).
